<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>主控端 - 加油机自动检定监控</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0a0e17;color:#e8edf5;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:manipulation}

.header{background:linear-gradient(135deg,#1a2332,#0d2847);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e3a5f;flex-shrink:0}
.header .title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.header .badge{font-size:10px;padding:2px 8px;background:#2563eb;border-radius:10px}
.header .info{font-size:11px;color:#5a6b87}

.tab-bar{display:flex;background:#111827;border-bottom:1px solid #1e3a5f;flex-shrink:0}
.tab-bar .tab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:500;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent}
.tab-bar .tab.active{color:#60a5fa;border-bottom-color:#2563eb;background:rgba(37,99,235,.06)}

.content{flex:1;overflow:hidden;position:relative}
.tab-panel{display:none;height:100%}
.tab-panel.active{display:flex;flex-direction:column}

.v-grid{flex:1;display:grid;gap:2px;padding:2px;background:#1e3a5f;overflow:hidden}
.v-grid.g1{grid-template-columns:1fr}
.v-grid.g4{grid-template-columns:1fr 1fr}
.v-grid.g9{grid-template-columns:1fr 1fr 1fr}

.v-cell{position:relative;background:#0a0e17;min-height:120px;overflow:hidden;border:2px solid transparent;transition:border-color .2s}
.v-cell.sel{border-color:#2563eb}
.v-cell video{width:100%;height:100%;object-fit:contain;background:#000}

.v-cell .ph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#374151}
.v-cell .ph .ic{font-size:28px}
.v-cell .ph p{font-size:11px;margin-top:3px}

.v-cell .lbl{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.6);padding:2px 7px;border-radius:3px;font-size:10px;color:#9ca3af;display:none;z-index:5}
.v-cell .lbl.show{display:block}

.v-cell .calip{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:1.5px solid #ef4444;border-radius:5px;padding:3px 8px;display:none;z-index:5}
.v-cell .calip.show{display:block}
.v-cell .calip .cl{font-size:9px;color:#f87171}
.v-cell .calip .cv{font-size:14px;font-weight:800;color:#ef4444;font-family:"Courier New",monospace;text-shadow:0 0 5px rgba(239,68,68,.4)}
.v-cell .calip .cu{font-size:10px;color:#f87171}

.v-cell .dot{position:absolute;bottom:6px;left:6px;width:6px;height:6px;border-radius:50%;background:#10b981;display:none;z-index:5}
.v-cell .dot.show{display:block}

.grid-toggle{position:absolute;top:6px;right:6px;display:flex;gap:3px;z-index:20}
.g-btn{width:28px;height:28px;background:rgba(0,0,0,.7);border:1px solid #374151;border-radius:5px;color:#9ca3af;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.g-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}

.c-bar{background:#111827;padding:8px 14px 16px;border-top:1px solid #1e3a5f;flex-shrink:0}

.audio-bar{height:3px;background:#1f2937;border-radius:2px;margin-bottom:6px;overflow:hidden;display:none}
.audio-bar.show{display:block}
.audio-bar .bar{height:100%;background:#10b981;border-radius:2px;width:0%;transition:width .08s}

.phrases{display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;-webkit-overflow-scrolling:touch;padding-bottom:3px}
.ph-btn{flex-shrink:0;padding:5px 10px;background:#1f2937;border:1px solid #374151;border-radius:14px;color:#9ca3af;font-size:11px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.ph-btn:active{background:#2563eb;border-color:#2563eb;color:#fff}

.ptt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ptt-btn{width:52px;height:52px;border-radius:50%;border:3px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
.ptt-btn:active,.ptt-btn.active{background:#ef4444;border-color:#ef4444;color:#fff;transform:scale(1.06)}
.ptt-info{flex:1}
.ptt-info .t{font-size:12px;color:#e8edf5;font-weight:600}
.ptt-info .h{font-size:10px;color:#6b7280}

.act-row{display:flex;gap:6px}
.act-btn{flex:1;padding:9px;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;color:#fff;background:#374151;-webkit-tap-highlight-color:transparent}
.act-btn:active{transform:scale(.96)}
.act-btn.p{background:#2563eb}
.act-btn.d{background:#ef4444}

.dev-panel{padding:14px;overflow-y:auto;flex:1}
.dev-card{background:#111827;border:1px solid #1e3a5f;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.dev-card .ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.dev-card .ic.on{background:rgba(16,185,129,.15)}
.dev-card .ic.off{background:rgba(107,114,128,.15)}
.dev-card .inf{flex:1}
.dev-card .inf .nm{font-size:13px;font-weight:600}
.dev-card .inf .mt{font-size:10px;color:#6b7280;margin-top:1px}
.dev-card .rm{width:28px;height:28px;border-radius:6px;background:rgba(239,68,68,.1);border:none;color:#f87171;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.add-card{background:transparent;border:2px dashed #374151;border-radius:10px;padding:16px;text-align:center;color:#6b7280;cursor:pointer;margin-bottom:8px}
.add-card:active{border-color:#2563eb;color:#60a5fa}
.add-card .plus{font-size:24px;margin-bottom:3px}
.add-card p{font-size:12px}

.s-scroll{padding:14px;overflow-y:auto;flex:1}
.s-section{margin-bottom:16px}
.s-section h3{font-size:13px;color:#e8edf5;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #1e3a5f}
.s-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(30,58,95,.5)}
.s-item .lb{font-size:12px;color:#9ca3af}
.s-item .lb small{display:block;font-size:10px;color:#4b5563;margin-top:1px}
.tgl{width:40px;height:22px;background:#374151;border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:#2563eb}
.tgl::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s}
.tgl.on::after{left:20px}

.dialog{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;align-items:center;justify-content:center;padding:16px}
.dialog.show{display:flex}
.dialog .box{background:#111827;border:1px solid #1e3a5f;border-radius:14px;padding:20px;width:100%;max-width:340px}
.dialog h3{font-size:15px;margin-bottom:14px}
.dialog input{width:100%;padding:10px;background:#1f2937;border:1px solid #374151;border-radius:7px;color:#e8edf5;font-size:13px;margin-bottom:10px}
.dialog .hint{font-size:10px;color:#6b7280;margin-bottom:10px}
.dialog .btn-r{display:flex;gap:7px}
.dialog .btn-r .btn{flex:1;padding:9px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:#fff}
.dialog .btn-cancel{background:#374151}
.dialog .btn-ok{background:#2563eb}

.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,.85);color:#e8edf5;padding:6px 14px;border-radius:6px;font-size:12px;z-index:100;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.log-area{background:#0a0e17;border:1px solid #1e3a5f;border-radius:6px;padding:6px;max-height:80px;overflow-y:auto;font-family:monospace;font-size:10px;color:#6b7280;margin-top:6px}
.log-area .li{margin-bottom:1px}
.log-area .li.ok{color:#34d399}
.log-area .li.err{color:#f87171}
.log-area .li.inf{color:#60a5fa}
</style>
</head>
<body>

<div class="header">
  <div class="title">🖥️ 加油机检定 · 主控端 <span class="badge">WEB</span></div>
  <span class="info" id="connCount">0 台在线</span>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('monitor',this)">📹 监控</div>
  <div class="tab" onclick="switchTab('devices',this)">📱 设备</div>
  <div class="tab" onclick="switchTab('settings',this)">⚙️ 设置</div>
</div>

<div class="content">
  <div class="tab-panel active" id="panel-monitor">
    <div class="v-grid g4" id="vGrid"></div>
    <div class="grid-toggle">
      <button class="g-btn active" onclick="setGrid(1)">1</button>
      <button class="g-btn" onclick="setGrid(4)">4</button>
      <button class="g-btn" onclick="setGrid(9)">9</button>
    </div>
  </div>

  <div class="tab-panel" id="panel-devices">
    <div class="dev-panel" id="devPanel"></div>
  </div>

  <div class="tab-panel" id="panel-settings">
    <div class="s-scroll">
      <div class="s-section">
        <h3>音频</h3>
        <div class="s-item"><div class="lb">环境监听<small>听取采集端现场声音</small></div><div class="tgl on" id="tglListen" onclick="this.classList.toggle('on')"></div></div>
        <div class="s-item"><div class="lb">扬声器输出<small>通过手机扬声器播放</small></div><div class="tgl on" onclick="this.classList.toggle('on')"></div></div>
      </div>
      <div class="s-section">
        <h3>显示</h3>
        <div class="s-item"><div class="lb">显示卡尺读数<small>红色数字叠加在画面上</small></div><div class="tgl on" id="tglCaliper" onclick="this.classList.toggle('on')"></div></div>
      </div>
      <div class="s-section">
        <h3>日志</h3>
        <div class="log-area" id="logArea"><div class="li inf">系统就绪</div></div>
      </div>
    </div>
  </div>
</div>

<div class="c-bar" id="cBar">
  <div class="audio-bar" id="audioBar"><div class="bar" id="audioBarInner"></div></div>
  <div class="phrases" id="phrasesRow">
    <button class="ph-btn" onclick="sendPhrase(this)">检定完成，请卸油</button>
    <button class="ph-btn" onclick="sendPhrase(this)">卸油完，确保阀门关紧，可以进行下一把的检定</button>
  </div>
  <div class="ptt-row">
    <button class="ptt-btn" id="pttBtn" onpointerdown="masterTalkStart()" onpointerup="masterTalkStop()" onpointerleave="masterTalkStop()">PTT</button>
    <div class="ptt-info"><div class="t">按住说话</div><div class="h">语音将通过采集端蓝牙音箱播放</div></div>
  </div>
  <div class="act-row">
    <button class="act-btn p" onclick="showAddDialog()">+ 连接设备</button>
    <button class="act-btn" onclick="remoteCmd('switch_cam')">🔄 切镜头</button>
    <button class="act-btn" onclick="remoteCmd('flash')">🔦 闪光</button>
  </div>
</div>

<div class="dialog" id="addDialog">
  <div class="box">
    <h3>连接采集端</h3>
    <input type="text" id="peerIdInput" placeholder="输入采集端设备ID">
    <div class="hint">在采集端 → 设置 → 复制设备ID，粘贴到这里</div>
    <div class="btn-r">
      <button class="btn btn-cancel" onclick="hideAddDialog()">取消</button>
      <button class="btn btn-ok" onclick="connectDevice()">连接</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let devices=[],currentGrid=4,selIdx=0,isTalking=false,barTimer=null,masterPeer=null,masterStream=null;

function log(m,t=''){
  const a=document.getElementById('logArea'),d=document.createElement('div');
  d.className='li '+t;d.textContent=`[${new Date().toLocaleTimeString()}] ${m}`;
  a.appendChild(d);a.scrollTop=a.scrollHeight;console.log(m);
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('cBar').style.display=tab==='monitor'?'':'none';
}

function initMaster(){
  log('正在连接信令服务器...','inf');
  const id='fdm-master-'+Math.random().toString(36).substr(2,6);
  try{
    masterPeer=new Peer(id,{
      debug:1,
      config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}
    });
    masterPeer.on('open',function(){log('主控端PeerJS已就绪','ok');toast('连接成功')});
    masterPeer.on('error',function(err){log('主控端错误: '+err.type,'err')});
    masterPeer.on('close',function(){log('连接已关闭','err')});
  }catch(e){log('PeerJS初始化失败: '+e.message,'err')}
  setTimeout(function(){if(!masterPeer||!masterPeer.id){log('连接较慢，请检查网络或刷新','err')}},3000);
}

async function connectDevice(){
  const peerId=document.getElementById('peerIdInput').value.trim();
  if(!peerId){toast('请输入采集端设备ID');return}
  if(devices.some(d=>d.peerId===peerId)){toast('该设备已连接');hideAddDialog();return}
  hideAddDialog();toast('正在连接 '+peerId+'...');

  if(!masterStream){
    try{
      masterStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true},video:false});
      log('麦克风已获取','ok');
    }catch(e){log('麦克风获取失败: '+e.message,'err');toast('无法获取麦克风权限');return}
  }

  const call=masterPeer.call(peerId,masterStream);
  const conn=masterPeer.connect(peerId);
  const dev={name:'采集端-'+(devices.length+1),peerId:peerId,call:call,conn:conn,online:false,stream:null};
  devices.push(dev);

  call.on('stream',function(remoteStream){
    dev.stream=remoteStream;dev.online=true;
    log('已连接: '+dev.name+' (视频+音频)','ok');toast('已连接: '+dev.name);
    renderGrid();renderDevices();updateCount();
  });
  call.on('close',function(){dev.online=false;dev.stream=null;log(dev.name+' 已断开','inf');renderGrid();renderDevices();updateCount()});
  call.on('error',function(err){log('连接错误: '+err,'err');dev.online=false;toast('连接失败');renderGrid();renderDevices();updateCount()});

  renderDevices();renderGrid();updateCount();
}

function renderGrid(){
  const grid=document.getElementById('vGrid');grid.innerHTML='';grid.className='v-grid g'+currentGrid;
  const count=currentGrid;
  for(let i=0;i<count;i++){
    const cell=document.createElement('div');
    cell.className='v-cell'+(i===selIdx?' sel':'');cell.onclick=()=>{selIdx=i;document.querySelectorAll('.v-cell').forEach((c,j)=>c.classList.toggle('sel',j===i))};
    const d=devices[i];
    if(d&&d.stream){
      const video=document.createElement('video');video.autoplay=true;video.playsinline=true;video.muted=false;video.srcObject=d.stream;cell.appendChild(video);
    }else{
      const ph=document.createElement('div');ph.className='ph';ph.innerHTML=d?'<div class="ic">📴</div><p>等待视频</p>':'<div class="ic">📹</div><p>未连接</p>';cell.appendChild(ph);
    }
    const lbl=document.createElement('div');lbl.className='lbl'+(d?' show':'');lbl.textContent=d?d.name:'';cell.appendChild(lbl);
    const calip=document.createElement('div');calip.className='calip';calip.innerHTML='<div class="cl">卡尺读数</div><div class="cv">--</div><div class="cu">mm</div>';
    if(d&&d.online&&document.getElementById('tglCaliper').classList.contains('on')){calip.classList.add('show');simulateCaliper(calip)}
    cell.appendChild(calip);
    const dot=document.createElement('div');dot.className='dot'+(d&&d.online?' show':'');cell.appendChild(dot);
    grid.appendChild(cell);
  }
}

function simulateCaliper(el){
  const valEl=el.querySelector('.cv'),readings=['23.42','23.44','23.40','23.46','23.38'];let idx=0;valEl.textContent='23.42';
  const t=setInterval(()=>{if(!document.getElementById('tglCaliper').classList.contains('on')){clearInterval(t);return}valEl.textContent=readings[idx%readings.length];idx++},2500);
}

function setGrid(n){currentGrid=n;document.querySelectorAll('.g-btn').forEach((b,i)=>b.classList.toggle('active',[1,4,9][i]===n));renderGrid()}
function updateCount(){const c=devices.filter(d=>d.online).length;document.getElementById('connCount').textContent=c+' 台在线'}

function renderDevices(){
  const panel=document.getElementById('devPanel');panel.innerHTML='';
  const addCard=document.createElement('div');addCard.className='add-card';addCard.innerHTML='<div class="plus">+</div><p>连接采集端</p>';addCard.onclick=showAddDialog;panel.appendChild(addCard);
  devices.forEach((d,i)=>{
    const card=document.createElement('div');card.className='dev-card';
    card.innerHTML=`<div class="ic ${d.online?'on':'off'}">${d.online?'📱':'📴'}</div><div class="inf"><div class="nm">${d.name}</div><div class="mt">${d.online?'在线 · 已连接':'离线 · '+d.peerId}</div></div><button class="rm" onclick="disconnectDevice(${i})">✕</button>`;
    panel.appendChild(card);
  });
}

function disconnectDevice(idx){
  const d=devices[idx];if(d.call)d.call.close();if(d.conn)d.conn.close();devices.splice(idx,1);renderDevices();renderGrid();updateCount();toast('已断开连接');
}

function remoteCmd(cmd){
  const d=devices[selIdx];if(!d||!d.conn){toast('请先连接设备');return}d.conn.send({type:cmd});toast('已发送: '+(cmd==='flash'?'闪光灯':'切镜头'));
}

function masterTalkStart(){
  if(!masterStream){toast('请先连接设备并授权麦克风');return}
  document.getElementById('pttBtn').classList.add('active');isTalking=true;document.getElementById('audioBar').classList.add('show');
  devices.forEach(d=>{if(d.conn)try{d.conn.send({type:'talk_start'})}catch(e){}});
  barTimer=setInterval(()=>{if(!isTalking)return;const l=Math.random()*70+20;const bar=document.getElementById('audioBarInner');bar.style.width=l+'%';bar.style.background=l>65?'#f59e0b':'#10b981'},80);
}

function masterTalkStop(){
  document.getElementById('pttBtn').classList.remove('active');isTalking=false;document.getElementById('audioBar').classList.remove('show');document.getElementById('audioBarInner').style.width='0%';
  if(barTimer){clearInterval(barTimer);barTimer=null}
  devices.forEach(d=>{if(d.conn)try{d.conn.send({type:'talk_stop'})}catch(e){}});
}

function sendPhrase(btn){const text=btn.textContent;devices.forEach(d=>{if(d.conn)try{d.conn.send({type:'phrase',text:text})}catch(e){}});toast('已发送: '+text)}
function showAddDialog(){document.getElementById('addDialog').classList.add('show');document.getElementById('peerIdInput').value='';document.getElementById('peerIdInput').focus()}
function hideAddDialog(){document.getElementById('addDialog').classList.remove('show')}

initMaster();renderGrid();renderDevices();
log('加油机自动检定监控 · 主控端已就绪','inf');log('请输入采集端设备ID进行连接','inf');
document.addEventListener('click',function(){if(!masterStream){navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(s=>{masterStream=s;log('麦克风已就绪','ok')}).catch(()=>{})}},{once:true});
</script>
</body>
</html>
