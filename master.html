<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>主控端 - 加油机自动检定监控</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0a0e17;
    color: #e8edf5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a2332, #0d2847);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #1e3a5f;
    flex-shrink: 0;
  }
  .header .title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header .badge {
    font-size: 11px;
    padding: 2px 8px;
    background: #2563eb;
    border-radius: 10px;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    background: #111827;
    border-bottom: 1px solid #1e3a5f;
    flex-shrink: 0;
  }
  .tab-bar .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: #6b7280;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-bar .tab.active {
    color: #60a5fa;
    border-bottom-color: #2563eb;
    background: rgba(37,99,235,0.08);
  }

  /* Content area */
  .content {
    flex: 1;
    overflow-y: auto;
    position: relative;
  }

  /* Tab panels */
  .tab-panel {
    display: none;
    height: 100%;
  }
  .tab-panel.active { display: flex; flex-direction: column; }

  /* Video grid */
  .video-grid {
    flex: 1;
    display: grid;
    gap: 2px;
    padding: 2px;
    background: #1e3a5f;
    overflow: hidden;
  }
  .video-grid.grid-1 { grid-template-columns: 1fr; }
  .video-grid.grid-4 { grid-template-columns: 1fr 1fr; }
  .video-grid.grid-9 { grid-template-columns: 1fr 1fr 1fr; }

  .video-cell {
    position: relative;
    background: #0a0e17;
    min-height: 150px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .video-cell.selected { border-color: #2563eb; }
  .video-cell video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .video-cell .cell-placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #374151;
  }
  .video-cell .cell-placeholder .icon { font-size: 32px; }
  .video-cell .cell-placeholder p { font-size: 12px; margin-top: 4px; }

  .video-cell .cell-label {
    position: absolute;
    top: 8px; left: 8px;
    background: rgba(0,0,0,0.6);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: #9ca3af;
    display: none;
  }
  .video-cell .cell-label.show { display: block; }

  /* Caliper reading on remote video */
  .video-cell .caliper-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.7);
    border: 1.5px solid #ef4444;
    border-radius: 6px;
    padding: 4px 10px;
    display: none;
    z-index: 10;
  }
  .video-cell .caliper-badge.show { display: block; }
  .video-cell .caliper-badge .caliper-label { font-size: 10px; color: #f87171; }
  .video-cell .caliper-badge .caliper-val {
    font-size: 16px;
    font-weight: 800;
    color: #ef4444;
    font-family: "Courier New", monospace;
    text-shadow: 0 0 6px rgba(239,68,68,0.4);
  }
  .video-cell .caliper-badge .caliper-unit { font-size: 11px; color: #f87171; }

  /* Online indicator on cell */
  .video-cell .online-dot {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #10b981;
    display: none;
    z-index: 10;
  }
  .video-cell .online-dot.show { display: block; }

  /* Grid toggle */
  .grid-toggle {
    position: absolute;
    top: 8px; right: 8px;
    display: flex;
    gap: 4px;
    z-index: 20;
  }
  .grid-btn {
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #374151;
    border-radius: 6px;
    color: #9ca3af;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grid-btn.active { background: #2563eb; border-color: #2563eb; color: white; }

  /* Control bar */
  .control-bar {
    background: #111827;
    padding: 10px 16px 16px;
    border-top: 1px solid #1e3a5f;
    flex-shrink: 0;
  }

  /* PTT control */
  .ptt-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .ptt-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 3px solid #374151;
    background: #1f2937;
    color: #9ca3af;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    -webkit-user-select: none;
    user-select: none;
    line-height: 1;
    gap: 2px;
  }
  .ptt-btn:active, .ptt-btn.active {
    background: #ef4444;
    border-color: #ef4444;
    color: white;
    transform: scale(1.08);
  }
  .ptt-info { flex: 1; }
  .ptt-info .title-text { font-size: 13px; color: #e8edf5; font-weight: 600; }
  .ptt-info .hint-text { font-size: 11px; color: #6b7280; }

  /* Quick phrases */
  .phrases-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    margin-bottom: 10px;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .phrase-btn {
    flex-shrink: 0;
    padding: 6px 12px;
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 16px;
    color: #9ca3af;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .phrase-btn:active { background: #2563eb; border-color: #2563eb; color: white; }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 8px;
  }
  .action-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: white;
    background: #374151;
    transition: all 0.2s;
  }
  .action-btn:active { transform: scale(0.96); }
  .action-btn.primary { background: #2563eb; }
  .action-btn.danger { background: #ef4444; }

  /* ===== Devices Tab ===== */
  .devices-panel {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
  }
  .device-card {
    background: #111827;
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .device-card .icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .device-card .icon.online { background: rgba(16,185,129,0.15); }
  .device-card .icon.offline { background: rgba(107,114,128,0.15); }
  .device-card .info { flex: 1; }
  .device-card .info .name { font-size: 14px; font-weight: 600; }
  .device-card .info .meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .device-card .remove-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(239,68,68,0.1);
    border: none;
    color: #f87171;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .add-device-card {
    background: transparent;
    border: 2px dashed #374151;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: #6b7280;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .add-device-card:active { border-color: #2563eb; color: #60a5fa; }
  .add-device-card .plus { font-size: 28px; margin-bottom: 4px; }
  .add-device-card p { font-size: 13px; }

  /* ===== Settings Tab ===== */
  .settings-scroll {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
  }
  .settings-section {
    margin-bottom: 20px;
  }
  .settings-section h3 {
    font-size: 14px;
    color: #e8edf5;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #1e3a5f;
  }
  .setting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(30,58,95,0.5);
  }
  .setting-item .label { font-size: 13px; color: #9ca3af; }
  .setting-item .label small { display: block; font-size: 11px; color: #4b5563; margin-top: 2px; }

  .toggle {
    width: 44px; height: 24px;
    background: #374151;
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: #2563eb; }
  .toggle::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 22px; }

  /* Audio level */
  .audio-level {
    height: 4px;
    background: #1f2937;
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
    display: none;
  }
  .audio-level.show { display: block; }
  .audio-level .bar {
    height: 100%;
    background: #10b981;
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s;
  }

  /* Connection input dialog */
  .connect-dialog {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .connect-dialog.show { display: flex; }
  .connect-dialog .dialog-box {
    background: #111827;
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }
  .connect-dialog h3 { font-size: 16px; margin-bottom: 16px; }
  .connect-dialog input {
    width: 100%;
    padding: 12px;
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 8px;
    color: #e8edf5;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .connect-dialog .btn-row {
    display: flex;
    gap: 8px;
  }
  .connect-dialog .btn-row .btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: white;
  }
  .connect-dialog .btn-cancel { background: #374151; }
  .connect-dialog .btn-confirm { background: #2563eb; }

  /* Toast */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.85);
    color: #e8edf5;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 100;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="title">
    🖥️ 加油机检定 · 主控端
    <span class="badge">WEB</span>
  </div>
  <span style="font-size:12px;color:#6b7280;" id="connCount">0 台在线</span>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('monitor')">📹 监控</div>
  <div class="tab" onclick="switchTab('devices')">📱 设备</div>
  <div class="tab" onclick="switchTab('settings')">⚙️ 设置</div>
</div>

<!-- Content -->
<div class="content">

  <!-- Monitor Tab -->
  <div class="tab-panel active" id="panel-monitor">
    <div class="video-grid grid-4" id="videoGrid">
      <!-- Cells will be generated by JS -->
    </div>

    <div class="grid-toggle">
      <button class="grid-btn active" onclick="setGrid(1)">1</button>
      <button class="grid-btn" onclick="setGrid(4)">4</button>
      <button class="grid-btn" onclick="setGrid(9)">9</button>
    </div>
  </div>

  <!-- Devices Tab -->
  <div class="tab-panel" id="panel-devices">
    <div class="devices-panel" id="devicesPanel">
      <!-- Device cards will be generated by JS -->
    </div>
  </div>

  <!-- Settings Tab -->
  <div class="tab-panel" id="panel-settings">
    <div class="settings-scroll">
      <div class="settings-section">
        <h3>音频设置</h3>
        <div class="setting-item">
          <div class="label">
            环境监听
            <small>听取采集端现场声音</small>
          </div>
          <div class="toggle on" id="toggleListen" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="setting-item">
          <div class="label">
            扬声器输出
            <small>通过手机扬声器播放</small>
          </div>
          <div class="toggle on" id="toggleSpeaker" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>

      <div class="settings-section">
        <h3>显示设置</h3>
        <div class="setting-item">
          <div class="label">
            显示卡尺读数
            <small>在监控画面上叠加红色读数</small>
          </div>
          <div class="toggle on" id="toggleCaliperDisplay" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="setting-item">
          <div class="label">
            自动全屏
            <small>选中画面时自动全屏显示</small>
          </div>
          <div class="toggle" id="toggleFullscreen" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>

      <div class="settings-section">
        <h3>关于</h3>
        <div class="setting-item">
          <div class="label" style="text-align:center;width:100%;">
            <span style="color:#e8edf5;font-weight:600;">加油机自动检定监控软件</span><br>
            <small style="color:#4b5563;">v1.0 Web版 · 纯浏览器运行</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Control bar (only in monitor tab) -->
<div class="control-bar" id="controlBar">
  <!-- Audio level -->
  <div class="audio-level" id="audioLevel">
    <div class="bar" id="audioBar"></div>
  </div>

  <!-- Quick phrases -->
  <div class="phrases-row" id="phrasesRow">
    <button class="phrase-btn" onclick="sendPhrase(this)">开始检定</button>
    <button class="phrase-btn" onclick="sendPhrase(this)">读数稳定</button>
    <button class="phrase-btn" onclick="sendPhrase(this)">调整位置</button>
    <button class="phrase-btn" onclick="sendPhrase(this)">暂停检定</button>
    <button class="phrase-btn" onclick="sendPhrase(this)">检定完成</button>
    <button class="phrase-btn" onclick="sendPhrase(this)">记录数据</button>
    <button class="phrase-btn" onclick="sendPhrase(this)">注意安全</button>
  </div>

  <!-- PTT -->
  <div class="ptt-row">
    <button class="ptt-btn" id="pttBtn"
      onpointerdown="masterStartTalk()"
      onpointerup="masterStopTalk()"
      onpointerleave="masterStopTalk()">
      PTT
    </button>
    <div class="ptt-info">
      <div class="title-text">按住说话</div>
      <div class="hint-text">语音将通过采集端蓝牙音箱播放</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="action-btn primary" onclick="showConnectDialog()">+ 添加设备</button>
    <button class="action-btn" onclick="switchCameraRemote()">🔄 切镜头</button>
    <button class="action-btn" onclick="toggleFlashRemote()">🔦 闪光灯</button>
  </div>
</div>

<!-- Connect Dialog -->
<div class="connect-dialog" id="connectDialog">
  <div class="dialog-box">
    <h3>添加采集端设备</h3>
    <input type="text" id="deviceInput" placeholder="输入设备名称，如：采集端-1" value="采集端-1">
    <p style="font-size:11px;color:#6b7280;margin-bottom:12px;">在同一 WiFi 热点下，输入采集端设备名即可连接</p>
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideConnectDialog()">取消</button>
      <button class="btn-confirm" onclick="addDevice()">添加</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== State =====
let devices = [];
let currentGrid = 4;
let selectedDeviceIdx = 0;
let isTalking = false;
let audioContext = null;
let demoInterval = null;

// ===== Tabs =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');

  // Show/hide control bar
  document.getElementById('controlBar').style.display = tab === 'monitor' ? '' : 'none';
}

// ===== Video Grid =====
function renderGrid() {
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = '';
  grid.className = 'video-grid grid-' + currentGrid;

  const count = currentGrid;
  for (let i = 0; i < count; i++) {
    const cell = document.createElement('div');
    cell.className = 'video-cell' + (i === selectedDeviceIdx ? ' selected' : '');
    cell.onclick = () => selectCell(i);

    const placeholder = document.createElement('div');
    placeholder.className = 'cell-placeholder';
    placeholder.innerHTML = '<div class="icon">📹</div><p>等待连接</p>';

    const label = document.createElement('div');
    label.className = 'cell-label';
    label.textContent = devices[i] ? devices[i].name : '';

    const caliperBadge = document.createElement('div');
    caliperBadge.className = 'caliper-badge';
    caliperBadge.innerHTML = '<div class="caliper-label">游标卡尺读数</div><div class="caliper-val">--</div><div class="caliper-unit">mm</div>';

    const onlineDot = document.createElement('div');
    onlineDot.className = 'online-dot';

    cell.appendChild(placeholder);
    cell.appendChild(label);
    cell.appendChild(caliperBadge);
    cell.appendChild(onlineDot);
    grid.appendChild(cell);
  }
  updateDeviceCount();
}

function selectCell(idx) {
  selectedDeviceIdx = idx;
  document.querySelectorAll('.video-cell').forEach((c, i) => {
    c.classList.toggle('selected', i === idx);
  });
}

function setGrid(n) {
  currentGrid = n;
  document.querySelectorAll('.grid-btn').forEach((b, i) => {
    b.classList.toggle('active', [1,4,9][i] === n);
  });
  renderGrid();
}

// ===== Devices =====
function renderDevices() {
  const panel = document.getElementById('devicesPanel');
  panel.innerHTML = '';

  // Add button
  const addCard = document.createElement('div');
  addCard.className = 'add-device-card';
  addCard.innerHTML = '<div class="plus">+</div><p>添加采集端设备</p>';
  addCard.onclick = showConnectDialog;
  panel.appendChild(addCard);

  // Device cards
  devices.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'device-card';
    card.innerHTML = `
      <div class="icon ${d.online ? 'online' : 'offline'}">${d.online ? '📱' : '📴'}</div>
      <div class="info">
        <div class="name">${d.name}</div>
        <div class="meta">${d.online ? '在线 · ' + (d.resolution || '720p') : '离线'}</div>
      </div>
      <button class="remove-btn" onclick="removeDevice(${i})">✕</button>
    `;
    panel.appendChild(card);
  });

  // Sync grid cells
  updateGridCells();
  updateDeviceCount();
}

function updateGridCells() {
  const cells = document.querySelectorAll('.video-cell');
  cells.forEach((cell, i) => {
    const d = devices[i];
    const placeholder = cell.querySelector('.cell-placeholder');
    const label = cell.querySelector('.cell-label');
    const caliperBadge = cell.querySelector('.caliper-badge');
    const onlineDot = cell.querySelector('.online-dot');

    if (d && d.online) {
      placeholder.style.display = 'none';
      label.textContent = d.name;
      label.classList.add('show');
      onlineDot.classList.add('show');
      if (document.getElementById('toggleCaliperDisplay').classList.contains('on')) {
        caliperBadge.classList.add('show');
        // Simulate caliper reading
        simulateCaliperReading(cell, caliperBadge);
      }
    } else if (d && !d.online) {
      placeholder.style.display = '';
      placeholder.innerHTML = '<div class="icon">📴</div><p>设备离线</p>';
      label.textContent = d.name;
      label.classList.add('show');
      onlineDot.classList.remove('show');
      caliperBadge.classList.remove('show');
    } else {
      placeholder.style.display = '';
      placeholder.innerHTML = '<div class="icon">📹</div><p>等待连接</p>';
      label.classList.remove('show');
      onlineDot.classList.remove('show');
      caliperBadge.classList.remove('show');
    }
  });
}

function simulateCaliperReading(cell, badge) {
  const valEl = badge.querySelector('.caliper-val');
  const readings = ['23.42', '23.44', '23.40', '23.46', '23.38'];
  let idx = 0;
  const interval = setInterval(() => {
    if (!document.getElementById('toggleCaliperDisplay').classList.contains('on')) {
      clearInterval(interval);
      return;
    }
    valEl.textContent = readings[idx % readings.length];
    idx++;
  }, 2500);
  valEl.textContent = '23.42';
}

function updateDeviceCount() {
  const onlineCount = devices.filter(d => d.online).length;
  document.getElementById('connCount').textContent = onlineCount + ' 台在线';
}

// ===== Connect Dialog =====
function showConnectDialog() {
  document.getElementById('connectDialog').classList.add('show');
  document.getElementById('deviceInput').value = '采集端-' + (devices.length + 1);
  document.getElementById('deviceInput').focus();
}

function hideConnectDialog() {
  document.getElementById('connectDialog').classList.remove('show');
}

function addDevice() {
  const name = document.getElementById('deviceInput').value.trim();
  if (!name) { showToast('请输入设备名称'); return; }
  if (devices.some(d => d.name === name)) { showToast('设备已存在'); return; }

  devices.push({ name, online: true, resolution: '1280x720' });
  hideConnectDialog();
  renderDevices();
  renderGrid();
  showToast('已添加设备: ' + name);
}

function removeDevice(idx) {
  devices.splice(idx, 1);
  renderDevices();
  renderGrid();
  showToast('设备已移除');
}

// ===== Remote Control =====
function switchCameraRemote() {
  const d = devices[selectedDeviceIdx];
  if (!d || !d.online) { showToast('请先选择在线设备'); return; }
  showToast('已切换 ' + d.name + ' 摄像头');
}

function toggleFlashRemote() {
  const d = devices[selectedDeviceIdx];
  if (!d || !d.online) { showToast('请先选择在线设备'); return; }
  showToast(d.name + ' 闪光灯已切换');
}

// ===== PTT =====
function masterStartTalk() {
  const btn = document.getElementById('pttBtn');
  btn.classList.add('active');
  isTalking = true;
  document.getElementById('audioLevel').classList.add('show');
  animateAudioLevel();
  showToast('正在对讲...');
}

function masterStopTalk() {
  const btn = document.getElementById('pttBtn');
  btn.classList.remove('active');
  isTalking = false;
  document.getElementById('audioLevel').classList.remove('show');
  document.getElementById('audioBar').style.width = '0%';
  if (demoInterval) { clearInterval(demoInterval); demoInterval = null; }
}

function animateAudioLevel() {
  const bar = document.getElementById('audioBar');
  demoInterval = setInterval(() => {
    if (!isTalking) return;
    const level = Math.random() * 80 + 20;
    bar.style.width = level + '%';
    bar.style.background = level > 70 ? '#f59e0b' : '#10b981';
  }, 100);
}

// ===== Quick Phrases =====
function sendPhrase(btn) {
  const text = btn.textContent;
  showToast('已发送: ' + text);
  btn.style.background = '#2563eb';
  btn.style.color = 'white';
  btn.style.borderColor = '#2563eb';
  setTimeout(() => {
    btn.style.background = '';
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 500);
}

// ===== Toast =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== Init =====
renderGrid();
renderDevices();
</script>

</body>
</html>
