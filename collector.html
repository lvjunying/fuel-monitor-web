<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>采集端 - 加油机自动检定监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0a0e17;color:#e8edf5;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:manipulation}
.header{background:linear-gradient(135deg,#1a2332,#0d2847);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e3a5f;flex-shrink:0}
.header .title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.header .dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:blink 1.5s infinite}
.header .dot.online{background:#10b981}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.header .conn-info{font-size:11px;color:#5a6b87;text-align:right;line-height:1.4}
.video-area{flex:1;position:relative;background:#000;overflow:hidden;touch-action:none}
.video-area video{width:100%;height:100%;object-fit:cover}
.video-area .placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#5a6b87}
.video-area .placeholder .icon{font-size:44px;margin-bottom:8px}
.video-area .placeholder p{font-size:13px}
.focus-ring{position:absolute;width:70px;height:70px;border:2px solid #fbbf24;border-radius:4px;pointer-events:none;opacity:0;transition:opacity .3s,transform .2s;z-index:10}
.focus-ring.show{opacity:1;animation:focusAnim .8s ease-out}
@keyframes focusAnim{0%{transform:translate(-50%,-50%) scale(1.5);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.zoom-control{position:absolute;bottom:80px;right:12px;z-index:10;display:none;flex-direction:column;align-items:center;gap:4px}
.zoom-control.show{display:flex}
.zoom-control label{font-size:10px;color:#fbbf24;background:rgba(0,0,0,.6);padding:2px 6px;border-radius:4px}
.zoom-control input[type=range]{writing-mode:vertical-lr;direction:rtl;height:140px;width:28px;accent-color:#fbbf24}
.zoom-val{font-size:10px;color:#fbbf24;background:rgba(0,0,0,.6);padding:1px 5px;border-radius:3px;font-weight:600}
.zoom-btns{display:flex;flex-direction:column;gap:3px}
.zoom-btn{width:28px;height:28px;background:rgba(0,0,0,.7);border:1px solid #374151;border-radius:6px;color:#fbbf24;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.zoom-btn:active{background:#fbbf24;color:#000}
.caliper-overlay{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.75);border:2px solid #ef4444;border-radius:8px;padding:6px 12px;display:none;z-index:5}
.caliper-overlay.show{display:block}
.caliper-overlay .cl{font-size:10px;color:#f87171}
.caliper-overlay .cv{font-size:20px;font-weight:800;color:#ef4444;font-family:"Courier New",monospace;text-shadow:0 0 6px rgba(239,68,68,.5)}
.caliper-overlay .cu{font-size:12px;color:#f87171}
.rec-ind{position:absolute;top:10px;left:10px;display:none;align-items:center;gap:5px;background:rgba(0,0,0,.6);padding:3px 8px;border-radius:5px;font-size:11px;color:#ef4444;font-weight:600;z-index:5}
.rec-ind.show{display:flex}
.rec-ind .rd{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:blink 1s infinite}
.dev-info{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:5px;font-size:10px;color:#8899b0;display:none;z-index:5}
.dev-info.show{display:block}
.remote-audio-ind{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:4px;background:rgba(37,99,235,.6);padding:3px 10px;border-radius:5px;font-size:11px;color:#93c5fd;font-weight:600;z-index:5}
.remote-audio-ind.show{display:flex}
.controls{background:#111827;padding:10px 14px 18px;border-top:1px solid #1e3a5f;flex-shrink:0}
.ctrl-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ctrl-row:last-child{margin-bottom:0}
.btn{flex:1;padding:10px 6px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;color:#fff;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96)}
.btn-p{background:#2563eb}
.btn-p.active{background:#10b981}
.btn-s{background:#374151}
.btn-xs{flex:none;padding:8px 12px;font-size:11px}
.ptt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ptt-btn{width:54px;height:54px;border-radius:50%;border:3px solid #374151;background:#1f2937;color:#9ca3af;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
.ptt-btn:active,.ptt-btn.active{background:#ef4444;border-color:#ef4444;color:#fff;transform:scale(1.06)}
.ptt-label{font-size:11px;color:#6b7280}
.ptt-label .hint{font-size:10px;color:#4b5563}
.audio-bar{height:3px;background:#1f2937;border-radius:2px;margin-top:6px;overflow:hidden;display:none}
.audio-bar.show{display:block}
.audio-bar .bar{height:100%;background:#10b981;border-radius:2px;width:0%;transition:width .08s}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40}
.modal-bg.show{display:block}
.settings{display:none;background:#111827;padding:16px;position:absolute;bottom:0;left:0;right:0;border-radius:14px 14px 0 0;border-top:1px solid #1e3a5f;max-height:55vh;overflow-y:auto;z-index:50}
.settings.show{display:block}
.settings h3{font-size:14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.settings h3 .x{cursor:pointer;font-size:18px;color:#6b7280}
.sg{margin-bottom:14px}
.sg label{display:block;font-size:11px;color:#6b7280;margin-bottom:4px}
.sg select,.sg input{width:100%;padding:8px;background:#1f2937;border:1px solid #374151;border-radius:6px;color:#e8edf5;font-size:13px}
.tgl-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.tgl-row .tl{font-size:12px;color:#9ca3af}
.tgl{width:40px;height:22px;background:#374151;border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:#2563eb}
.tgl::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s}
.tgl.on::after{left:20px}
.log-area{background:#0a0e17;border:1px solid #1e3a5f;border-radius:6px;padding:8px;max-height:100px;overflow-y:auto;font-family:monospace;font-size:10px;color:#6b7280;margin-top:6px}
.log-area .li{margin-bottom:1px}
.log-area .li.ok{color:#34d399}
.log-area .li.err{color:#f87171}
.log-area .li.inf{color:#60a5fa}
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,.85);color:#e8edf5;padding:6px 14px;border-radius:6px;font-size:12px;z-index:100;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.room-status{font-size:11px;color:#fbbf24;margin-top:4px;min-height:16px}
.room-status.waiting{color:#fbbf24}
.room-status.connected{color:#34d399}
.room-status.error{color:#f87171}
</style>
</head>
<body>
<div class="header">
  <div class="title"><span class="dot" id="sDot"></span>加油机检定 · 采集端</div>
  <div class="conn-info" id="connInfo">未连接</div>
</div>
<div class="video-area" id="videoArea">
  <video id="localVideo" autoplay muted playsinline></video>
  <div class="placeholder" id="ph"><div class="icon">📹</div><p>点击「开启摄像头」</p></div>
  <div class="focus-ring" id="focusRing"></div>
  <div class="zoom-control" id="zoomCtrl">
    <div class="zoom-val" id="zoomVal">1.0x</div>
    <input type="range" id="zoomSlider" min="100" max="500" value="100" orient="vertical">
    <div class="zoom-btns">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
    </div>
  </div>

    <div class="cl">游标卡尺读数</div>
    <div class="cv" id="calipVal">--</div>
    <div class="cu">mm</div>
  </div>

  <div class="remote-audio-ind" id="remoteAudioInd">🔊 主控端正在说话</div>
  <div class="dev-info" id="devInfo"></div>
</div>

    <button class="btn btn-p" id="btnCam" onclick="toggleCamera()">📹 开启摄像头</button>

  </div>

    <button class="btn btn-s btn-xs" onclick="toggleCaliper()">📏</button>

  </div>

</div>

    <label>连接模式</label>

      <input type="text" id="roomIdInput" placeholder="输入房间号，如 001" style="flex:1">

    </div>

  </div>
  <div class="sg" id="peerjsPanel" style="display:none">

    <input type="text" id="myId" readonly style="color:#60a5fa">
  </div>

      <option value="0">自动选择（推荐）</option>

      <option value="2">Render托管</option>
      <option value="3">本地测试(localhost:9000)</option>
    </select>
  </div>
  <div class="sg" id="lanCodeWrap" style="display:none">
    <label>局域网直连</label>
    <div style="font-size:11px;color:#6b7280;margin-bottom:6px">
      步骤：<br>
      1. 主控端点「生成连接码」并复制<br>
      2. 粘贴到下方输入框，点「接受连接」<br>
      3. 把生成的应答码复制回主控端
    </div>
    <textarea id="lanOfferInput" rows="4" placeholder="在此粘贴主控端的连接码..." style="width:100%;padding:8px;background:#1f2937;border:1px solid #374151;border-radius:6px;color:#e8edf5;font-size:11px;font-family:monospace;resize:vertical"></textarea>
    <button class="btn btn-s btn-xs" style="width:100%;margin-top:6px" onclick="lanAcceptOffer()">📥 接受连接</button>
    <textarea id="lanAnswerOutput" rows="4" readonly placeholder="应答码将显示在这里..." style="width:100%;margin-top:8px;padding:8px;background:#0a0e17;border:1px solid #374151;border-radius:6px;color:#34d399;font-size:11px;font-family:monospace;resize:vertical"></textarea>
    <button class="btn btn-s btn-xs" style="width:100%;margin-top:6px" onclick="copyLanAnswer()">📋 复制应答码</button>

  <div class="sg"><label>设备名称</label><input type="text" id="devName" value="采集端-1"></div>
  <div class="sg">
    <label>视频分辨率（越小延迟越低）</label>
    <select id="resolution">
      <option value="640x480" selected>640x480（低延迟）</option>
      <option value="1280x720">1280x720（高清）</option>

    </select>
  </div>
  <div class="sg">
    <label>视频帧率</label>
    <select id="framerate">
      <option value="15" selected>15 fps（低延迟）</option>
      <option value="24">24 fps</option>
      <option value="30">30 fps</option>

  </div>
  <div class="tgl-row"><span class="tl">卡尺识别（模拟）</span><div class="tgl" id="tglCaliper" onclick="this.classList.toggle('on')"></div></div>
  <div class="tgl-row"><span class="tl">实时监听主控端</span><div class="tgl on" id="tglListen" onclick="toggleListenSetting()"></div></div>
  <button class="btn btn-p" style="width:100%;margin-top:10px" onclick="applySettings()">应用</button>
  <div class="log-area" id="logArea"><div class="li inf">系统就绪</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 极简 MQTT 3.1.1 客户端（原生 WebSocket，无需外部库）
// ============================================================
var MiniMQTT=(function(){
  function MiniMQTT(url,opts){
    this.url=url;this.opts=opts||{};
    this.ws=null;this.connected=false;this.msgHandler=null;
    this.errHandler=null;this.closeHandler=null;
    this.pingTimer=null;
  }
  MiniMQTT.prototype.connect=function(){
    var self=this;
    try{this.ws=new WebSocket(this.url)}catch(e){if(self.errHandler)self.errHandler(e);return}
    this.ws.binaryType='arraybuffer';
    this.ws.onopen=function(){self._sendConnect()};
    this.ws.onmessage=function(evt){self._onMessage(evt)};
    this.ws.onerror=function(e){if(self.errHandler)self.errHandler(e)};
    this.ws.onclose=function(){self.connected=false;if(self.pingTimer)clearInterval(self.pingTimer);if(self.closeHandler)self.closeHandler()};
  };
  MiniMQTT.prototype._sendConnect=function(){
    var clientId=this.opts.clientId||'mini-'+Math.random().toString(36).substr(2,10);
    // CONNECT 包: 固定头 0x10 + 剩余长度 + 变长头 + payload
    var protocolName='MQTT';var protocolLevel=4; // MQTT 3.1.1
    var connectFlags=0x02; // Clean session
    var keepAlive=30;
    // 编码变长头
    var protoBytes=this._encodeUTF8(protocolName);
    var varHeader=[];
    varHeader.push(protoBytes.length>>8,protoBytes.length&0xFF);
    for(var i=0;i<protoBytes.length;i++)varHeader.push(protoBytes[i]);
    varHeader.push(protocolLevel,connectFlags,keepAlive>>8,keepAlive&0xFF);
    // payload: client ID
    var idBytes=this._encodeUTF8(clientId);
    var payload=[];
    payload.push(idBytes.length>>8,idBytes.length&0xFF);
    for(var i=0;i<idBytes.length;i++)payload.push(idBytes[i]);
    var remLen=varHeader.length+payload.length;
    var packet=[0x10]; // CONNECT
    packet=packet.concat(this._encodeRemLen(remLen));
    packet=packet.concat(varHeader).concat(payload);
    this.ws.send(new Uint8Array(packet).buffer);
  };
  MiniMQTT.prototype._onMessage=function(evt){
    var data=new Uint8Array(evt.data);
    if(data.length<2)return;
    var cmd=data[0]>>4;
    if(cmd===2){ // CONNACK
      this.connected=true;
      if(this.opts.onConnect)this.opts.onConnect();
      // 心跳
      var self=this;
      this.pingTimer=setInterval(function(){
        if(self.ws&&self.ws.readyState===WebSocket.OPEN){
          self.ws.send(new Uint8Array([0xC0,0x00]).buffer); // PINGREQ
        }
      },25000);
    }else if(cmd===3){ // PUBLISH
      var qos=(data[0]>>1)&0x03;
      var pos=1;var mul=1;var rem=0;var val;
      do{val=data[pos++];rem+=(val&0x7F)*mul;mul*=128}while((val&0x80)!==0&&pos<data.length);
      var topicLen=(data[pos]<<8)|data[pos+1];pos+=2;
      var topic=this._decodeUTF8(data,pos,topicLen);pos+=topicLen;
      if(qos>0)pos+=2; // msgId
      var msgBytes=data.slice(pos,pos+rem-(pos-(1+this._remLenBytes(rem))));
      // 简化：直接取剩余部分作为消息
      var msgLen=rem-((pos-1)-this._remLenBytes(rem));
      var msgText=this._decodeUTF8(data,pos,data.length-pos);
      if(this.msgHandler)this.msgHandler(topic,msgText);
    }else if(cmd===9){ // SUBACK
      // 订阅确认，忽略
    }else if(cmd===13){ // PINGRESP
      // 心跳回复，忽略
    }
  };
  MiniMQTT.prototype._remLenBytes=function(rem){
    var bytes=1;var v=rem;
    while(v>=128){v>>=7;bytes++}
    return bytes;
  };
  MiniMQTT.prototype.subscribe=function(topic){
    if(!this.connected||!this.ws||this.ws.readyState!==WebSocket.OPEN)return;
    var topicBytes=this._encodeUTF8(topic);
    var msgId=Math.floor(Math.random()*65535)+1;
    var payload=[];
    payload.push(topicBytes.length>>8,topicBytes.length&0xFF);
    for(var i=0;i<topicBytes.length;i++)payload.push(topicBytes[i]);
    payload.push(0); // QoS 0
    var varHeader=[msgId>>8,msgId&0xFF];
    var remLen=varHeader.length+payload.length;
    var packet=[0x82]; // SUBSCRIBE
    packet=packet.concat(this._encodeRemLen(remLen));
    packet=packet.concat(varHeader).concat(payload);
    this.ws.send(new Uint8Array(packet).buffer);
  };
  MiniMQTT.prototype.publish=function(topic,message){
    if(!this.connected||!this.ws||this.ws.readyState!==WebSocket.OPEN)return;
    var topicBytes=this._encodeUTF8(topic);
    var msgBytes=this._encodeUTF8(message);
    var varHeader=[];
    varHeader.push(topicBytes.length>>8,topicBytes.length&0xFF);
    for(var i=0;i<topicBytes.length;i++)varHeader.push(topicBytes[i]);
    var remLen=varHeader.length+msgBytes.length;
    var packet=[0x30]; // PUBLISH QoS 0
    packet=packet.concat(this._encodeRemLen(remLen));
    packet=packet.concat(varHeader);
    for(var i=0;i<msgBytes.length;i++)packet.push(msgBytes[i]);
    this.ws.send(new Uint8Array(packet).buffer);
  };
  MiniMQTT.prototype.end=function(){
    this.connected=false;
    if(this.pingTimer)clearInterval(this.pingTimer);
    if(this.ws){try{this.ws.close()}catch(e){}this.ws=null}
  };
  MiniMQTT.prototype._encodeUTF8=function(str){
    var bytes=[];for(var i=0;i<str.length;i++){
      var c=str.charCodeAt(i);
      if(c<128)bytes.push(c);
      else if(c<2048)bytes.push(0xC0|(c>>6),0x80|(c&0x3F));
      else if(c<65536)bytes.push(0xE0|(c>>12),0x80|((c>>6)&0x3F),0x80|(c&0x3F));
      else bytes.push(0xF0|(c>>18),0x80|((c>>12)&0x3F),0x80|((c>>6)&0x3F),0x80|(c&0x3F));
    }
    return bytes;
  };
  MiniMQTT.prototype._decodeUTF8=function(data,start,len){
    var str='';var i=start;var end=start+len;
    while(i<end){
      var b=data[i];
      if(b<128){str+=String.fromCharCode(b);i++}
      else if(b<224){str+=String.fromCharCode((b&0x1F)<<6|(data[i+1]&0x3F));i+=2}
      else if(b<240){str+=String.fromCharCode((b&0x0F)<<12|((data[i+1]&0x3F)<<6)|(data[i+2]&0x3F));i+=3}
      else{var cp=(b&0x07)<<18|((data[i+1]&0x3F)<<12)|((data[i+2]&0x3F)<<6)|(data[i+3]&0x3F);cp-=0x10000;str+=String.fromCharCode(0xD800+(cp>>10),0xDC00+(cp&0x3FF));i+=4}
    }
    return str;
  };
  MiniMQTT.prototype._encodeRemLen=function(n){
    var bytes=[];
    do{var b=n%128;n=Math.floor(n/128);if(n>0)b|=0x80;bytes.push(b)}while(n>0);
    return bytes;
  };
  return MiniMQTT;
})();

var stream=null,peer=null,isFront=false,isFlash=false,isCaliper=false,isTalking=false,isListening=true;
var caliperTimer=null,focusTimer=null,audioCtx=null,remoteAudioEl=null;
var currentZoom=1,hasOpticalZoom=false,minZoom=1,maxZoom=5;
var lastTouchDist=0,lastTapTime=0;
var localVideo=document.getElementById('localVideo'),ph=document.getElementById('ph');

function log(m,t){
  var a=document.getElementById('logArea'),d=document.createElement('div');
  d.className='li '+(t||'');d.textContent='['+new Date().toLocaleTimeString()+'] '+m;
  a.appendChild(d);a.scrollTop=a.scrollHeight;console.log(m);
}

// ====== 房间号直连模式（MQTT 信令 + WebRTC P2P） ======
// ============================================================
var MQTT_URL='wss://broker.emqx.io:8084/mqtt';
var mqttClient=null,currentRoomId=null,roomPc=null,roomDataChannel=null;
var mySenderId='col-'+Math.random().toString(36).substr(2,6);
var masterSenderId=null;

function setRoomStatus(text){
  var el=document.getElementById('roomStatus');
  if(el)el.textContent=text;
}

function joinRoom(){
  var roomId=document.getElementById('roomIdInput').value.trim();
  if(!roomId){toast('请输入房间号');return}
  currentRoomId=roomId;
  setRoomStatus('正在连接信令服务器...');
  log('房间号直连：连接MQTT服务器(broker.emqx.io)...','inf');
  document.getElementById('connInfo').innerHTML='<span style="color:#fbbf24">连接中...</span>';
  
  try{
    mqttClient=new MiniMQTT(MQTT_URL,{clientId:'fdm-col-'+roomId+'-'+mySenderId});
    mqttClient.msgHandler=function(topic,message){handleMqttMessage(message)};
    mqttClient.errHandler=function(err){
      clearTimeout(connectTimeout);
      log('MQTT错误: '+(err.message||err),'err');
      setRoomStatus('连接错误');
    };
    mqttClient.closeHandler=function(){
      log('MQTT连接已关闭','err');
      if(currentRoomId)setRoomStatus('连接断开，请重新加入');
    };
    mqttClient.opts.onConnect=function(){
      clearTimeout(connectTimeout);
      log('MQTT已连接','ok');
      var topic='fdm/room/'+roomId;
      mqttClient.subscribe(topic);
      setRoomStatus('已加入房间 '+roomId+'，等待主控端...');
      log('已订阅 '+topic+'，等待主控端...','inf');
      document.getElementById('connInfo').innerHTML='<span style="color:#fbbf24">房间 '+roomId+' 等待中</span>';
      mqttSend({type:'join',role:'collector',roomId:roomId,senderId:mySenderId});
    };
    
    var connectTimeout=setTimeout(function(){
      if(!mqttClient.connected){
        log('MQTT连接超时(8秒)','err');
        setRoomStatus('连接超时，请检查网络后重试');
        document.getElementById('connInfo').innerHTML='<span style="color:#f87171">超时</span>';
        toast('连接超时');
        try{mqttClient.end()}catch(e){}
      }
    },8000);
    
    mqttClient.connect();
  }catch(e){
    log('MQTT连接失败: '+e.message,'err');
    setRoomStatus('连接失败: '+e.message);
    document.getElementById('connInfo').innerHTML='<span style="color:#f87171">连接失败</span>';
  }
}

function mqttSend(msg){
  if(mqttClient&&mqttClient.connected){
    msg.senderId=msg.senderId||mySenderId;
    mqttClient.publish('fdm/room/'+currentRoomId,JSON.stringify(msg));
  }
}

function handleMqttMessage(data){
  var msg;try{msg=JSON.parse(data)}catch(e){return}
  // 忽略自己发的消息
  if(msg.senderId===mySenderId)return;
  log('MQTT收: '+msg.type+(msg.role?' ('+msg.role+')':''),'inf');
  
  switch(msg.type){
    case 'offer':
      if(msg.role==='master'){
        masterSenderId=msg.senderId;
        log('收到主控端连接请求','ok');
        setRoomStatus('收到连接请求，正在应答...');
        handleRoomOffer(msg.data);
      }
      break;
    case 'ice':
      if(msg.senderId===masterSenderId&&roomPc){
        roomPc.addIceCandidate(new RTCIceCandidate(msg.data))
          .then(function(){log('ICE已添加','inf')})
          .catch(function(e){log('ICE添加失败: '+e.message,'err')});
      }
      break;
    case 'bye':
      log('主控端已离开','err');
      setRoomStatus('主控端已断开');
      updateStatus(false);
      break;
  }
}

async function handleRoomOffer(offerData){
  if(!stream){toast('请先开启摄像头');setRoomStatus('请先开启摄像头再连接');return}
  try{
    roomPc=new RTCPeerConnection({
      iceServers:[
        {urls:'stun:stun.qq.com:3478'},
        {urls:'stun:stun.miwifi.com:3478'},
        {urls:'stun:stun.l.google.com:19302'}
      ]
    });
    // 添加本地视频和音频轨道
    stream.getTracks().forEach(function(t){roomPc.addTrack(t,stream)});
    // 接收主控端音频流
    roomPc.ontrack=function(e){
      log('收到远端轨道: kind='+e.track.kind,'ok');
      var remoteStream=e.streams&&e.streams[0]?e.streams[0]:new MediaStream();
      if(!e.streams||!e.streams[0])remoteStream.addTrack(e.track);
      if(!remoteAudioEl){
        remoteAudioEl=document.createElement('audio');
        remoteAudioEl.autoplay=true;remoteAudioEl.playsInline=true;
        document.body.appendChild(remoteAudioEl);
      }
      remoteAudioEl.srcObject=remoteStream;
      log('已接收主控端音频','ok');
    };
    // 数据通道（接收命令）
    roomPc.ondatachannel=function(e){
      roomDataChannel=e.channel;
      roomDataChannel.onmessage=function(ev){
        try{var data=JSON.parse(ev.data);handleCommand(data)}catch(ex){}
      };
      roomDataChannel.onopen=function(){log('数据通道已建立','ok')};
    };
    // ICE状态
    roomPc.oniceconnectionstatechange=function(){
      var st=roomPc.iceConnectionState;
      log('ICE状态: '+st,'inf');
      if(st==='connected'||st==='completed'){
        updateStatus(true);setRoomStatus('连接成功！');log('P2P连接成功！','ok');toast('已连接主控端');
      }else if(st==='disconnected'||st==='failed'||st==='closed'){
        updateStatus(false);setRoomStatus('连接已断开');log('P2P断开','err');
      }
    };
    // ICE candidate 转发
    roomPc.onicecandidate=function(e){
      if(e.candidate&&masterSenderId){
        mqttSend({type:'ice',role:'collector',roomId:currentRoomId,targetId:masterSenderId,data:e.candidate});
      }
    };
    // 设置远端描述（offer）
    await roomPc.setRemoteDescription(new RTCSessionDescription(offerData));
    log('已设置远端offer','ok');
    // 创建answer
    var answer=await roomPc.createAnswer();
    await roomPc.setLocalDescription(answer);
    // 等待ICE收集
    await waitForIce(roomPc);
    // 发送answer
    mqttSend({type:'answer',role:'collector',roomId:currentRoomId,targetId:masterSenderId,data:roomPc.localDescription});
    log('Answer已发送','ok');
    setRoomStatus('已应答，等待P2P连接建立...');
  }catch(e){
    log('处理offer失败: '+e.message,'err');setRoomStatus('连接失败: '+e.message);toast('连接失败');
  }
}

function handleCommand(data){
  if(data.type==='talk_start')document.getElementById('remoteAudioInd').classList.add('show');
  else if(data.type==='talk_stop')document.getElementById('remoteAudioInd').classList.remove('show');
  else if(data.type==='flash')toggleFlash();
  else if(data.type==='switch_cam')switchCam();
  else if(data.type==='phrase'){speakText(data.text);toast(data.text);log('播报: '+data.text,'inf')}
}

function speakText(text){
  // 先播放提示音
  playBeep();
  // 尝试语音播报
  if(window.speechSynthesis){
    try{
      window.speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(text);
      u.lang='zh-CN';u.rate=0.9;u.pitch=1;u.volume=1;
      var voices=window.speechSynthesis.getVoices();
      var zhVoice=voices.find(function(v){return v.lang.indexOf('zh')!==-1});
      if(zhVoice)u.voice=zhVoice;
      u.onerror=function(e){log('语音播报失败，显示文字','err')};
      window.speechSynthesis.speak(u);
      log('正在语音播报...','inf');
    }catch(e){
      log('语音播报异常: '+e.message,'err');
    }
  }else{
    log('浏览器不支持语音播报，已显示文字提示','err');
  }
}

// 提示音
function playBeep(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.frequency.value=880;osc.type='sine';
    gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.3);
    osc.start();osc.stop(audioCtx.currentTime+0.3);
  }catch(e){}
}

// 预加载语音列表
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices()};
}

function waitForIce(pc){
  return new Promise(function(resolve){
    if(pc.iceGatheringState==='complete'){resolve();return}
    var t=setTimeout(function(){resolve()},2000);
    pc.onicegatheringstatechange=function(){if(pc.iceGatheringState==='complete'){clearTimeout(t);resolve()}};
  });
}

var peerServers=[
  {name:'官方默认',config:{}},
  {name:'PeerJS官方',config:{host:'0.peerjs.com',port:443,path:'/',secure:true}},
  {name:'Render托管',config:{host:'peerjs-server.onrender.com',port:443,path:'/',secure:true}}
];
var serverIdx=0,peerJsLoaded=false;

function loadPeerJS(){
  if(peerJsLoaded){initPeer();return}
  var s=document.createElement('script');
  s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
  s.onload=function(){peerJsLoaded=true;initPeer()};
  s.onerror=function(){log('PeerJS加载失败','err')};
  document.head.appendChild(s);
}

function initPeer(){
  var name=document.getElementById('devName').value.replace(/\s/g,'-')||'collector-1';
  var id='fdm-'+name+'-'+Math.random().toString(36).substr(2,6);
  var srv=peerServers[serverIdx];
  log('连接信令服务器('+srv.name+')...','inf');
  try{
    var opts={debug:1,config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun.qq.com:3478'}
    ]}};
    if(srv.config.host){opts.host=srv.config.host;opts.port=srv.config.port;opts.path=srv.config.path;opts.secure=srv.config.secure}
    peer=new Peer(id,opts);
    peer.on('open',function(myId){
      document.getElementById('myId').value=myId;
      document.getElementById('connInfo').innerHTML='<span style="color:#34d399">在线</span>';
      log('PeerJS已连接, ID='+myId,'ok');toast('连接成功');
    });
    peer.on('call',function(call){log('收到主控端请求','inf');call.answer(stream);handlePeerCall(call)});
    peer.on('connection',function(conn){
      conn.on('data',function(data){handleCommand(data)});
    });
    peer.on('error',function(err){
      log('PeerJS错误: '+err.type,'err');
      if(err.type==='unavailable-id'){peer.destroy();setTimeout(initPeer,1000)}
      else if(err.type==='network'||err.type==='disconnected'||err.type==='socket-error'||err.type==='server-error'){tryNextPeerServer()}
    });
    peer.on('close',function(){document.getElementById('connInfo').innerHTML='<span style="color:#f87171">离线</span>'});
  }catch(e){log('PeerJS初始化失败','err');tryNextPeerServer();return}
  setTimeout(function(){if(!peer||!peer.id){tryNextPeerServer()}},5000);
}

function tryNextPeerServer(){
  if(serverIdx<peerServers.length-1){serverIdx++;try{if(peer)peer.destroy()}catch(e){}peer=null;setTimeout(initPeer,1000)}
  else{log('所有PeerJS服务器失败','err');toast('连接失败')}
}

function handlePeerCall(call){
  call.on('stream',function(remoteStream){
    if(!remoteAudioEl){remoteAudioEl=document.createElement('audio');remoteAudioEl.autoplay=true;remoteAudioEl.playsInline=true;document.body.appendChild(remoteAudioEl)}
    if(remoteStream.getAudioTracks().length>0)remoteAudioEl.srcObject=remoteStream;
    log('已接收主控端音频','ok');updateStatus(true);
  });
  call.on('close',function(){updateStatus(false);document.getElementById('remoteAudioInd').classList.remove('show')});
  updateStatus(true);
}

var lanPc=null;
function lanAcceptOffer(){
  if(!stream){toast('请先开启摄像头');return}
  var offerStr=document.getElementById('lanOfferInput').value.trim();
  if(!offerStr){toast('请粘贴连接码');return}
  try{
    var offer=JSON.parse(decodeBase64(offerStr));
    lanPc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.qq.com:3478'},{urls:'stun:stun.miwifi.com:3478'}]});
    stream.getTracks().forEach(function(t){lanPc.addTrack(t,stream)});
    lanPc.ontrack=function(e){
      var rs=e.streams&&e.streams[0]?e.streams[0]:new MediaStream();
      if(!e.streams||!e.streams[0])rs.addTrack(e.track);
      if(!remoteAudioEl){remoteAudioEl=document.createElement('audio');remoteAudioEl.autoplay=true;remoteAudioEl.playsInline=true;document.body.appendChild(remoteAudioEl)}
      remoteAudioEl.srcObject=rs;log('已接收音频','ok');
    };
    lanPc.ondatachannel=function(ev){
      var ch=ev.channel;ch.onmessage=function(e2){try{handleCommand(JSON.parse(e2.data))}catch(ex){}};
    };
    lanPc.oniceconnectionstatechange=function(){
      var st=lanPc.iceConnectionState;
      if(st==='connected'||st==='completed'){updateStatus(true);toast('连接成功')}
      else if(st==='disconnected'||st==='failed'||st==='closed'){updateStatus(false)}
    };
    lanPc.onicecandidate=function(e){
      if(e.candidate){document.getElementById('lanAnswerOutput').value=encodeBase64(JSON.stringify(lanPc.localDescription))}
    };
    lanPc.setRemoteDescription(new RTCSessionDescription(offer)).then(function(){
      return lanPc.createAnswer();
    }).then(function(answer){
      return lanPc.setLocalDescription(answer);
    }).then(function(){
      setTimeout(function(){
        document.getElementById('lanAnswerOutput').value=encodeBase64(JSON.stringify(lanPc.localDescription));
        log('应答码已生成','ok');toast('应答码已生成');
      },1000);
    }).catch(function(e){log('连接失败: '+e.message,'err')});
  }catch(e){log('解析失败: '+e.message,'err')}
}
function copyLanAnswer(){

function encodeBase64(s){return btoa(encodeURIComponent(s).replace(/%([0-9A-F]{2})/g,function(m,p){return String.fromCharCode('0x'+p)}))}
function decodeBase64(s){return decodeURIComponent(atob(s).split('').map(function(c){return'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join(''))}

var videoArea=document.getElementById('videoArea');

videoArea.addEventListener('touchmove',function(e){

  var dist=getTouchDist(e);

},{passive:false});

function getTouchDist(e){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy)}

// ====== 闪光灯 ======
async function toggleFlash(){
  if(!stream)return;var tk=stream.getVideoTracks()[0];
  try{var cap=tk.getCapabilities();if(cap.torch){isFlash=!isFlash;await tk.applyConstraints({advanced:[{torch:isFlash}]});log(isFlash?'闪光灯开':'闪光灯关','inf')}else log('不支持闪光灯','err')}catch(e){log('闪光灯失败','err')}
}

// ====== 卡尺识别 ======
function toggleCaliper(){isCaliper?stopCaliper():startCaliper()}
function startCaliper(){
  if(!stream){log('先开摄像头','err');return}
  isCaliper=true;document.getElementById('calipOL').classList.add('show');document.getElementById('tglCaliper').classList.add('on');log('卡尺识别启动','ok');
  var base=23.40;document.getElementById('calipVal').textContent=base.toFixed(2);
  caliperTimer=setInterval(function(){document.getElementById('calipVal').textContent=(base+(Math.random()-.5)*.06).toFixed(2)},2000);
}
function stopCaliper(){isCaliper=false;if(caliperTimer){clearInterval(caliperTimer);caliperTimer=null}document.getElementById('calipOL').classList.remove('show');document.getElementById('tglCaliper').classList.remove('on');log('卡尺识别关闭','inf')}

// ====== 监听 ======
function toggleListen(){isListening=!isListening;if(remoteAudioEl)remoteAudioEl.muted=!isListening;toast(isListening?'已开启监听':'已关闭监听')}
function toggleListenSetting(){var t=document.getElementById('tglListen');t.classList.toggle('on');isListening=t.classList.contains('on');if(remoteAudioEl)remoteAudioEl.muted=!isListening}

// ====== PTT ======
function startTalk(){if(!stream)return;document.getElementById('pttBtn').classList.add('active');isTalking=true;document.getElementById('audioBar').classList.add('show');animateBar();log('开始对讲','inf')}
function stopTalk(){document.getElementById('pttBtn').classList.remove('active');isTalking=false;document.getElementById('audioBar').classList.remove('show');document.getElementById('audioBarInner').style.width='0%';if(focusTimer){clearInterval(focusTimer);focusTimer=null}}
function animateBar(){var bar=document.getElementById('audioBarInner');focusTimer=setInterval(function(){if(!isTalking)return;var l=Math.random()*70+20;bar.style.width=l+'%';bar.style.background=l>65?'#f59e0b':'#10b981'},80)}

// ====== 设置面板 ======
function showSettings(){document.getElementById('settingsPanel').classList.add('show');document.getElementById('modalBg').classList.add('show')}
function closeSettings(){document.getElementById('settingsPanel').classList.remove('show');document.getElementById('modalBg').classList.remove('show')}
function applySettings(){log('设置已应用','ok');closeSettings()}

// ====== 初始化 ======
log('加油机自动检定监控 · 采集端已就绪','inf');
log('推荐：输入房间号 → 加入房间 → 开启摄像头 → 等待主控端','inf');
document.addEventListener('click',function(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}catch(e){}},{once:false});
</script>
